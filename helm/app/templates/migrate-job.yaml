apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "devops-challenge.fullname" . }}-migrate
  labels:
    {{- include "devops-challenge.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-1"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate
        {{- include "devops-challenge.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["pnpm", "db:migrate:deploy"]
          env:
            - name: POSTGRES_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpg.clusterName }}-app
                  key: uri
            - name: POSTGRES_PRISMA_URL
              value: "$(POSTGRES_URI)?schema=public"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
