apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-challenge.fullname" . }}-db
  labels:
    {{- include "devops-challenge.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PRISMA_URL: "postgres://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}?schema=public"
