apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: devops-challenge
spec:
  instances: 1

  postgresql:
    parameters:
      max_connections: "100"

  bootstrap:
    initdb:
      database: currencies
      owner: app

  storage:
    size: 5Gi
    storageClass: local-path

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
